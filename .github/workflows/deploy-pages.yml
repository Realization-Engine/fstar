name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Run tests
        run: |
          dotnet test src/FStarEquationsTests/FStarEquationsTests.csproj -c Release --verbosity normal
          dotnet test src/FStarEquations.App.Tests/FStarEquations.App.Tests.csproj -c Release --verbosity normal

      - name: Publish Blazor app
        run: dotnet publish src/FStarEquations.App/FStarEquations.App.csproj -c Release -o output

      - name: Set base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/fstar/" />|g' output/wwwroot/index.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Create 404.html for client-side routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Create mermaid Lua filter
        run: |
          cat > /tmp/mermaid.lua << 'LUAEOF'
          function CodeBlock(block)
            if block.classes[1] == "mermaid" then
              return pandoc.RawBlock("html",
                '<pre class="mermaid">\n' .. block.text .. '\n</pre>')
            end
          end
          LUAEOF

      - name: Convert docs to HTML
        run: |
          mkdir -p output/wwwroot/docs output/wwwroot/css
          cp Docs/assets/css/paper.css output/wwwroot/css/paper.css

          # Render a paper through the variant-B template + paper.css.
          # Body heading levels are shifted down by one so the template
          # hero owns the document's single H1 and authored "# Part One"
          # style headings become H2 sections without source edits.
          render_paper() {
            local src="$1"
            local filename
            filename=$(basename "$src" .md)
            pandoc "$src" \
              --standalone \
              --template=Docs/assets/template.html \
              --shift-heading-level-by=1 \
              --css "../css/paper.css" \
              --css "../lib/katex/katex.min.css" \
              --katex="../lib/katex/" \
              --lua-filter=/tmp/mermaid.lua \
              --variable header-includes='<script type="module">import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";mermaid.initialize({startOnLoad:true});</script>' \
              -o "output/wwwroot/docs/${filename}.html"
          }

          # Papers (published with literary-journal treatment)
          for md in \
              "Docs/The_Multiplier_and_the_Mirror.md" \
              "Docs/The_Multiplier_and_the_Mirror_Citations.md" \
              "Docs/How-to-Read-the-Equations.md" \
              "Docs/Mathematical basis of The Mirror.md" ; do
            [ -f "$md" ] && render_paper "$md"
          done

      - name: Add docs index page
        run: |
          cat > output/wwwroot/docs/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>F* Framework - Documentation</title>
            <base href="/fstar/" />
            <link rel="stylesheet" href="css/Site.css" />
            <link rel="stylesheet" href="lib/katex/katex.min.css" />
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 48rem; margin: 3em 3em 0 3em; padding: 0 1rem; line-height: 1.6; color: #1a1a2e; }
              h1 { border-bottom: 2px solid #3a86ff; padding-bottom: 0.5rem; }
              a { color: #3a86ff; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .doc-list { list-style: none; padding: 0; }
              .doc-list li { margin: 1rem 0; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 8px; }
              .doc-list li a { font-size: 1.1rem; font-weight: 600; }
              .doc-list li p { margin: 0.5rem 0 0; color: #555; }
              .back-link { margin-top: 2rem; display: inline-block; }
            </style>
          </head>
          <body>
            <h1>F* Framework Documentation</h1>
            <ul class="doc-list">
              <li>
                <a href="docs/The_Multiplier_and_the_Mirror.html">The Multiplier, Mirror and The Tipping Point</a>
                <p>A mathematical framework for human capability under AI amplification and the future of software engineering.</p>
              </li>
              <li>
                <a href="docs/The_Multiplier_and_the_Mirror_Citations.html">Citations and References</a>
                <p>Supporting citations for the concept document.</p>
              </li>
            </ul>
            <a class="back-link" href="./">Back to App</a>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
